; Asterisk SIP Configuration for Landline Adapter
; Copy to /etc/asterisk/sip.conf on your VPS

[general]
context=default
allowguest=no
bindport=5060
bindaddr=0.0.0.0
transport=udp
nat=force_rport,comedia
externaddr=YOUR_VPS_IP_HERE
localnet=192.168.0.0/255.255.0.0

; Codecs
disallow=all
allow=ulaw
allow=alaw
allow=gsm

;-----------------------------------
; Kid's Phone (via ATA)
;-----------------------------------
[kid_phone]
type=friend
secret=CHANGE_THIS_PASSWORD
host=dynamic
context=kids
callerid="Kid Phone" <100>
dtmfmode=rfc2833
canreinvite=no

;-----------------------------------
; Parent's Phone (SIP app)
;-----------------------------------
[parent_phone]
type=friend
secret=CHANGE_THIS_PASSWORD
host=dynamic
context=default
callerid="Parent" <200>
dtmfmode=rfc2833
canreinvite=no

;-----------------------------------
; Raspberry Pi (call processor)
;-----------------------------------
[pi_processor]
type=friend
secret=CHANGE_THIS_PASSWORD
host=dynamic
context=default
callerid="Pi Processor" <300>
dtmfmode=rfc2833
canreinvite=no
