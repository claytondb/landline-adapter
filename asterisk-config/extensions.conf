; Asterisk Dialplan for Landline Adapter
; Copy to /etc/asterisk/extensions.conf on your VPS

[general]
static=yes
writeprotect=no

;-----------------------------------
; Context for Kid's Phone
; All calls go through whitelist check
;-----------------------------------
[kids]
; Extension 200 = Parent (always allowed)
exten => 200,1,NoOp(Kid calling parent)
 same => n,Dial(SIP/parent_phone,30)
 same => n,Hangup()

; Any other number - check whitelist
; In production, this would query the Pi's whitelist API
exten => _X.,1,NoOp(Kid dialing ${EXTEN})
 same => n,GotoIf($["${EXTEN}" = "911"]?emergency)
 same => n,GotoIf($["${EXTEN}" = "200"]?allowed)
 ; For now, block all other calls
 ; TODO: Integrate with Pi whitelist API
 same => n,Playback(access-denied)
 same => n,Hangup()
 same => n(allowed),Dial(SIP/parent_phone,30)
 same => n,Hangup()
 same => n(emergency),Dial(SIP/911,60)
 same => n,Hangup()

; Incoming calls to kid's phone
exten => 100,1,NoOp(Incoming call to kid phone)
 same => n,Dial(SIP/kid_phone,30)
 same => n,Hangup()

;-----------------------------------
; Default context for other devices
;-----------------------------------
[default]
; Allow calling the kid's phone
exten => 100,1,NoOp(Calling kid phone)
 same => n,Dial(SIP/kid_phone,30)
 same => n,Hangup()

; Allow calling the parent
exten => 200,1,NoOp(Calling parent)
 same => n,Dial(SIP/parent_phone,30)
 same => n,Hangup()

; Echo test
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()
